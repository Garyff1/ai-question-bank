name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android-app/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Get version
        id: ver
        run: |
          VER=$(grep "^version:" pubspec.yaml | awk "{print \$2}" | cut -d "+" -f 1)
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-v${{ steps.ver.outputs.version }}
          path: android-app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.ver.outputs.version }}
          name: Android v${{ steps.ver.outputs.version }}
          files: android-app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}